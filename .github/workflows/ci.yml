name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    name: Linux unit checks
    runs-on: ubuntu-latest
    env:
      SIMX_REAL_SIM_TESTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings

  macos:
    name: macOS checks
    runs-on: macos-15
    env:
      SIMX_REAL_SIM_TESTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
