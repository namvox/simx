name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: macOS Rust tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/release/simx dist/simx
          tar -C dist -czf simx-macos.tar.gz simx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simx-macos
          path: simx-macos.tar.gz
