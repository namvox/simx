name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release aarch64-apple-darwin
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp target/aarch64-apple-darwin/release/simx dist/package/simx
          cp README.md dist/package/README.md
          if [ -f LICENSE ]; then cp LICENSE dist/package/LICENSE; fi
          if [ -f CHANGELOG.md ]; then cp CHANGELOG.md dist/package/CHANGELOG.md; fi
          tar -C dist/package -czf dist/simx-aarch64-apple-darwin.tar.gz .
          cd dist
          shasum -a 256 simx-aarch64-apple-darwin.tar.gz > checksums.txt

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/simx-aarch64-apple-darwin.tar.gz
            dist/checksums.txt
            install.sh
